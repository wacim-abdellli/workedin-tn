name: Visual Regression

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  visual-regression:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Start preview server
        shell: pwsh
        run: |
          $process = Start-Process -FilePath npm.cmd -ArgumentList 'run','preview','--','--host','127.0.0.1','--port','4173' -WorkingDirectory $PWD -PassThru
          $process.Id | Out-File -FilePath preview-server.pid -Encoding ascii

      - name: Wait for preview server
        shell: pwsh
        run: |
          for ($i = 0; $i -lt 60; $i++) {
            try {
              Invoke-WebRequest -UseBasicParsing http://127.0.0.1:4173 | Out-Null
              exit 0
            } catch {
              Start-Sleep -Seconds 1
            }
          }
          throw 'Preview server did not become ready in time.'

      - name: Run visual regression suite
        run: npm run test:e2e:visual
        env:
          E2E_BASE_URL: http://127.0.0.1:4173

      - name: Stop preview server
        if: always()
        shell: pwsh
        run: |
          if (Test-Path preview-server.pid) {
            $pid = Get-Content preview-server.pid
            Stop-Process -Id $pid -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload visual diff artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: visual-test-results
          path: test-results/
          retention-days: 14
