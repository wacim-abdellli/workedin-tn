name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main, develop ]

jobs:
  verify:
    name: Verify (Strict Quality Gates)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Avatar Consistency Audit
        run: npm run avatar:audit

      - name: i18n Strict Audit
        run: npm run i18n:audit:strict

      - name: Type Check
        run: npx tsc --noEmit

      - name: Run Tests with Coverage
        run: npm run test:coverage

      - name: Build with Bundle Budgets
        run: npm run build:budget

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        continue-on-error: true

      - name: Run Strict Accessibility E2E
        run: npm run test:e2e:a11y:strict
        env:
          E2E_BASE_URL: http://localhost:5173

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 1
