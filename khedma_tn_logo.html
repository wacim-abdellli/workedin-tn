
<style>
  .logo-row { display:flex; align-items:center; justify-content:center; gap:48px; flex-wrap:wrap; padding:40px 24px; }
  .logo-cell { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .label { font-size:11px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--color-text-tertiary); }
  .on-dark { background:#0a0912; border-radius:16px; padding:28px 36px; }
  .on-light { background:#ffffff; border-radius:16px; padding:28px 36px; border:1px solid var(--color-border-tertiary); }
  .on-violet { background:#5B21B6; border-radius:16px; padding:28px 36px; }
</style>

<div class="logo-row">

  <!-- Primary — on light -->
  <div class="logo-cell">
    <div class="on-light">
      <svg width="180" height="40" viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg">
        <!-- Mark: two interlocking K-shapes forming a diamond handshake -->
        <!-- Left chevron arm -->
        <polygon points="0,20 10,4 16,4 8,20 16,36 10,36" fill="#5B21B6"/>
        <!-- Right chevron arm -->
        <polygon points="28,20 18,4 24,4 32,20 24,36 18,36" fill="#D97706"/>
        <!-- Center bridge diamond -->
        <polygon points="14,14 18,14 18,26 14,26" fill="#5B21B6" opacity="0.4"/>
        <polygon points="14,14 18,14 16,20" fill="#5B21B6"/>
        <polygon points="14,26 18,26 16,20" fill="#D97706"/>
        <!-- Wordmark -->
        <text x="42" y="27" font-family="'Outfit','DM Sans',system-ui,sans-serif" font-weight="700" font-size="22" fill="#1a1825" letter-spacing="-0.5">khedma</text>
        <text x="149" y="27" font-family="'Outfit','DM Sans',system-ui,sans-serif" font-weight="700" font-size="22" fill="#D97706" letter-spacing="-0.5">tn</text>
      </svg>
    </div>
    <span class="label">Primary · light</span>
  </div>

  <!-- Primary — on dark -->
  <div class="logo-cell">
    <div class="on-dark">
      <svg width="180" height="40" viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,20 10,4 16,4 8,20 16,36 10,36" fill="#7C3AED"/>
        <polygon points="28,20 18,4 24,4 32,20 24,36 18,36" fill="#D97706"/>
        <polygon points="14,14 18,14 16,20" fill="#7C3AED"/>
        <polygon points="14,26 18,26 16,20" fill="#D97706"/>
        <text x="42" y="27" font-family="'Outfit','DM Sans',system-ui,sans-serif" font-weight="700" font-size="22" fill="#F1F0FB" letter-spacing="-0.5">khedma</text>
        <text x="149" y="27" font-family="'Outfit','DM Sans',system-ui,sans-serif" font-weight="700" font-size="22" fill="#D97706" letter-spacing="-0.5">tn</text>
      </svg>
    </div>
    <span class="label">Primary · dark</span>
  </div>

  <!-- On brand violet -->
  <div class="logo-cell">
    <div class="on-violet">
      <svg width="180" height="40" viewBox="0 0 180 40" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,20 10,4 16,4 8,20 16,36 10,36" fill="rgba(255,255,255,0.9)"/>
        <polygon points="28,20 18,4 24,4 32,20 24,36 18,36" fill="#D97706"/>
        <polygon points="14,14 18,14 16,20" fill="rgba(255,255,255,0.7)"/>
        <polygon points="14,26 18,26 16,20" fill="#D97706"/>
        <text x="42" y="27" font-family="'Outfit','DM Sans',system-ui,sans-serif" font-weight="700" font-size="22" fill="#ffffff" letter-spacing="-0.5">khedma</text>
        <text x="149" y="27" font-family="'Outfit','DM Sans',system-ui,sans-serif" font-weight="700" font-size="22" fill="#FCD34D" letter-spacing="-0.5">tn</text>
      </svg>
    </div>
    <span class="label">Reversed · violet bg</span>
  </div>

</div>

<!-- Mark only row -->
<div class="logo-row" style="padding-top:0; gap:32px;">

  <!-- Icon mark sizes -->
  <div class="logo-cell">
    <div class="on-dark" style="padding:20px;">
      <svg width="48" height="48" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,20 10,4 16,4 8,20 16,36 10,36" fill="#7C3AED"/>
        <polygon points="32,20 22,4 28,4 32,20 28,36 22,36" fill="#D97706"/>
        <polygon points="14,14 18,14 16,20" fill="#7C3AED"/>
        <polygon points="14,26 18,26 16,20" fill="#D97706"/>
      </svg>
    </div>
    <span class="label">Icon 48px</span>
  </div>

  <div class="logo-cell">
    <div class="on-dark" style="padding:16px;">
      <svg width="32" height="32" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,20 10,4 16,4 8,20 16,36 10,36" fill="#7C3AED"/>
        <polygon points="32,20 22,4 28,4 32,20 28,36 22,36" fill="#D97706"/>
        <polygon points="14,14 18,14 16,20" fill="#7C3AED"/>
        <polygon points="14,26 18,26 16,20" fill="#D97706"/>
      </svg>
    </div>
    <span class="label">Icon 32px</span>
  </div>

  <div class="logo-cell">
    <div class="on-dark" style="padding:14px;">
      <svg width="20" height="20" viewBox="0 0 32 40" xmlns="http://www.w3.org/2000/svg">
        <polygon points="0,20 10,4 16,4 8,20 16,36 10,36" fill="#7C3AED"/>
        <polygon points="32,20 22,4 28,4 32,20 28,36 22,36" fill="#D97706"/>
        <polygon points="14,14 18,14 16,20" fill="#7C3AED"/>
        <polygon points="14,26 18,26 16,20" fill="#D97706"/>
      </svg>
    </div>
    <span class="label">Favicon 20px</span>
  </div>

  <!-- Pill badge version -->
  <div class="logo-cell">
    <div style="padding:8px 0;">
      <svg width="110" height="28" viewBox="0 0 110 28" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="110" height="28" rx="14" fill="#5B21B6"/>
        <polygon points="10,14 16,5 19,5 14,14 19,23 16,23" fill="white" opacity="0.9"/>
        <polygon points="24,14 19,5 22,5 26,14 22,23 19,23" fill="#D97706"/>
        <polygon points="18,9 21,9 19.5,14" fill="white" opacity="0.7"/>
        <polygon points="18,19 21,19 19.5,14" fill="#D97706"/>
        <text x="34" y="19" font-family="'Outfit','DM Sans',system-ui,sans-serif" font-weight="700" font-size="13" fill="white" letter-spacing="-0.2">khedma</text>
        <text x="91" y="19" font-family="'Outfit','DM Sans',system-ui,sans-serif" font-weight="700" font-size="13" fill="#FCD34D" letter-spacing="-0.2">tn</text>
      </svg>
    </div>
    <span class="label">Pill badge</span>
  </div>

</div>
