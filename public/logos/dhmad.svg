      <stop offset="0%" style="stop-color:hsl(174, 62%, 47%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(174, 72%, 40%);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(174, 62%, 47%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(217, 91%, 22%);stop-opacity:1" />
    </linearGradient>
  </defs>
