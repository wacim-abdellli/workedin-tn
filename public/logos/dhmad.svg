<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="hsl(210, 20%, 98%)"/>
  
  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#bgGradient)" opacity="0.1"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="150" fill="hsl(174, 62%, 47%)" opacity="0.1"/>
  <circle cx="1000" cy="480" r="200" fill="hsl(174, 62%, 47%)" opacity="0.05"/>
  
  <!-- Shield Icon (centered) -->
  <g transform="translate(600, 200)">
    <path d="M0 -80L-60 -50V30C-60 90 -20 140 30 140C80 140 120 90 120 30V-50L60 -80C55 -82 45 -82 40 -80L0 -80Z" fill="url(#shieldGradient)" stroke="url(#shieldGradient)" stroke-width="4"/>
    <path d="M0 -60L-45 -35V22.5C-45 67.5 -15 105 22.5 105C60 105 90 67.5 90 22.5V-35L45 -60C42 -61.5 38 -61.5 35 -60L0 -60Z" fill="white"/>
  </g>
  
  <!-- Text -->
  <text x="600" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" text-anchor="middle" fill="hsl(222, 47%, 11%)">
    Dhmad<tspan fill="hsl(174, 62%, 47%)">.tn</tspan>
  </text>
  
  <text x="600" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="32" text-anchor="middle" fill="hsl(215, 16%, 47%)">
