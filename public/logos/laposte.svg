<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <defs>
    <clipPath id="lp_clip">
      <rect width="120" height="80" rx="8"/>
    </clipPath>
  </defs>
  <!-- White background -->
  <rect width="120" height="80" rx="8" fill="white"/>
  
  <g clip-path="url(#lp_clip)">
    <!-- Top navy swoosh strip -->
    <path d="M0 14 C20 8, 45 18, 70 14 C88 11, 105 4, 120 9 L120 28 C105 22, 88 30, 70 33 C45 37, 20 27, 0 33 Z" fill="#1B3070"/>
    
    <!-- Bottom navy swoosh strip -->
    <path d="M0 40 C20 34, 45 44, 70 40 C88 37, 105 30, 120 35 L120 54 C105 48, 88 57, 70 60 C45 64, 20 54, 0 60 Z" fill="#1B3070"/>
    
    <!-- Yellow diamond top-right area -->
    <g transform="translate(85, 13) rotate(45)">
      <rect x="-4.5" y="-4.5" width="9" height="9" fill="#F5C518"/>
    </g>
    <g transform="translate(98, 15) rotate(45)">
      <rect x="-4" y="-4" width="8" height="8" fill="#F5C518"/>
    </g>
    
    <!-- Yellow diamond bottom-right area -->
    <g transform="translate(87, 40) rotate(45)">
      <rect x="-4.5" y="-4.5" width="9" height="9" fill="#F5C518"/>
    </g>
    <g transform="translate(100, 42) rotate(45)">
      <rect x="-4" y="-4" width="8" height="8" fill="#F5C518"/>
    </g>
  </g>
</svg>
