<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Storage Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f4f7f9;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }

        h1 {
            color: #1a202c;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            box-sizing: border-box;
        }

        .result {
            background: #f8fafc;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #3182ce;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .error {
            border-color: #e53e3e;
            background: #fff5f5;
            color: #c53030;
        }

        .success {
            border-color: #38a169;
            background: #f0fff4;
            color: #2f855a;
        }

        button {
            background: #3182ce;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background: #2c5282;
        }

        .file-input {
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <h1>🔍 Supabase Storage Diagnostic</h1>

    <div class="card">
        <h2>1. Enter Credentials</h2>
        <div class="input-group">
            <label>Supabase URL (VITE_SUPABASE_URL)</label>
            <input type="text" id="url" placeholder="https://xyz.supabase.co">
        </div>
        <div class="input-group">
            <label>Anon Key (VITE_SUPABASE_ANON_KEY)</label>
            <input type="password" id="key" placeholder="eyJhbGciOiJIUzI1NiI...">
        </div>
    </div>

    <div class="card">
        <h2>2. Test Upload</h2>
        <p>Before testing, make sure you are logged in to your app in another tab.</p>
        <div class="file-input">
            <input type="file" id="file" accept="image/*">
        </div>
        <button onclick="runDiagnostic()">Run Diagnostic & Test Upload</button>
    </div>

    <div id="logs"></div>

    <script>
        function log(message, type = '') {
            const logs = document.getElementById('logs');
            const div = document.createElement('div');
            div.className = 'result ' + type;
            div.innerHTML = message;
            logs.appendChild(div);
            console.log(message);
        }

        async function runDiagnostic() {
            document.getElementById('logs').innerHTML = ''; // Clear logs

            const url = document.getElementById('url').value.trim();
            const key = document.getElementById('key').value.trim();
            const file = document.getElementById('file').files[0];

            if (!url || !key) {
                log('❌ Please fill in the URL and Key above.', 'error');
                return;
            }

            if (!file) {
                log('❌ Please select an image to upload.', 'error');
                return;
            }

            try {
                if (!window.supabase) {
                    throw new Error('Supabase client library not loaded. Check internet connection.');
                }

                const supabase = window.supabase.createClient(url, key);
                log('✅ Supabase client initialized.');

                // 1. Check Auth
                log('⏳ Checking authentication...');
                const { data: { user }, error: authError } = await supabase.auth.getUser();

                if (authError) {
                    log('❌ Auth Error: ' + authError.message + '<br><small>Tip: Log in to your app first in another tab.</small>', 'error');
                } else if (!user) {
                    log('❌ Not Logged In: You must be logged in to your app for this test to work.', 'error');
                } else {
                    log('✅ Authenticated as: ' + user.email, 'success');
                }

                // 2. Test Bucket Access
                log('⏳ Checking "avatars" bucket...');
                const { data: bucket, error: bucketError } = await supabase.storage.getBucket('avatars');

                if (bucketError) {
                    log('❌ Bucket Error: ' + bucketError.message + '<br><small>Tip: Verify that an "avatars" bucket exists and is set to PUBLIC.</small>', 'error');
                } else {
                    log('✅ Bucket "avatars" found (Public: ' + bucket.public + ')', 'success');
                }

                // 3. Test Upload
                log('⏳ Attempting upload to "avatars" bucket...');
                const fileName = `diag-${user ? user.id : 'anon'}-${Date.now()}.${file.name.split('.').pop()}`;

                const startTime = Date.now();
                const { data: uploadData, error: uploadError } = await supabase.storage
                    .from('avatars')
                    .upload(fileName, file, { upsert: true });
                const duration = Date.now() - startTime;

                if (uploadError) {
                    log(`❌ Upload Failed (${duration}ms):<br><strong>${uploadError.message}</strong><br>Code: ${uploadError.statusCode || 'N/A'}<br>Details: ${JSON.stringify(uploadError)}`, 'error');
                } else {
                    log(`✅ Upload Successful in ${duration}ms!<br>Path: ${uploadData.path}`, 'success');

                    // 4. Get Public URL
                    const { data: { publicUrl } } = supabase.storage.from('avatars').getPublicUrl(fileName);
                    log(`🔗 Public URL: <a href="${publicUrl}" target="_blank">${publicUrl}</a>`, 'success');
                }

            } catch (err) {
                log('❌ System Error: ' + err.message, 'error');
                console.error(err);
            }
        }
    </script>
</body>

</html>
