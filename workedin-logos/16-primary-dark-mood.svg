<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" width="420" height="160">
  <rect width="420" height="160" fill="#0a0a0a"/>
  <!-- subtle grid texture -->
  <line x1="0" y1="40" x2="420" y2="40" stroke="#161616" stroke-width="1"/>
  <line x1="0" y1="80" x2="420" y2="80" stroke="#161616" stroke-width="1"/>
  <line x1="0" y1="120" x2="420" y2="120" stroke="#161616" stroke-width="1"/>
  <line x1="105" y1="0" x2="105" y2="160" stroke="#161616" stroke-width="1"/>
  <line x1="210" y1="0" x2="210" y2="160" stroke="#161616" stroke-width="1"/>
  <line x1="315" y1="0" x2="315" y2="160" stroke="#161616" stroke-width="1"/>
  <!-- amber glow block -->
  <rect x="24" y="28" width="100" height="100" fill="#E08A00"/>
  <!-- inner shadow top -->
  <rect x="24" y="28" width="100" height="6" fill="#c97a00"/>
  <polyline points="36,46 50,88 64,64 78,88 92,46" fill="none" stroke="#0a0a0a" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <line x1="104" y1="44" x2="104" y2="110" stroke="#0a0a0a" stroke-width="7" stroke-linecap="round"/>
  <line x1="98" y1="44" x2="110" y2="44" stroke="#0a0a0a" stroke-width="6" stroke-linecap="round"/>
  <line x1="98" y1="110" x2="110" y2="110" stroke="#0a0a0a" stroke-width="6" stroke-linecap="round"/>
  <!-- wordmark -->
  <text x="144" y="80" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" letter-spacing="-2" fill="#e8e8e8">WORKED</text>
  <text x="144" y="122" font-family="Arial Black, sans-serif" font-weight="900" font-size="42" letter-spacing="-2" fill="#E08A00">IN</text>
  <!-- amber accent line -->
  <rect x="144" y="132" width="220" height="2" fill="#E08A00" opacity="0.4"/>
  <text x="144" y="148" font-family="system-ui, sans-serif" font-size="10" fill="#333" letter-spacing="2.5">ELITE FREELANCE · VERIFIED TALENT</text>
</svg>
